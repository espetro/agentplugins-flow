name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: sudo apt-get install -y ripgrep
      - run: npm run lint
      - run: npm run check:dist
      - run: npm run test:trace-ui
      - run: npm test
