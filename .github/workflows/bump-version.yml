# Full release workflow — bumps version, commits, tags, and pushes.
# Run manually when you need a specific bump type (patch/minor/major).

name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of version bump'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || github.token }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current: $CURRENT"
          BUMP_TYPE=${{ github.event.inputs.bump_type }}
          if [ "$BUMP_TYPE" = "prerelease" ]; then
            NEW_VERSION=$(npx semver $CURRENT -i prerelease --preid alpha)
          else
            NEW_VERSION=$(npx semver $CURRENT -i $BUMP_TYPE)
          fi
          echo "New: $NEW_VERSION"
          npm version $NEW_VERSION --no-git-tag-version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update helloword.txt
        run: |
          echo "hello world" > helloword.txt
          echo "version: ${{ steps.bump.outputs.version }}" >> helloword.txt

      - name: Commit and tag
        run: |
          git add package.json package-lock.json helloword.txt
          BUMP_TYPE=${{ github.event.inputs.bump_type }}
          if [ "$BUMP_TYPE" = "prerelease" ]; then
            git commit -m "chore: bump alpha version to ${{ steps.bump.outputs.version }} [skip ci]"
          else
            git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          fi
          git tag v${{ steps.bump.outputs.version }}
          git push origin main
          git push origin v${{ steps.bump.outputs.version }}

      - name: Install dependencies
        run: npm ci
